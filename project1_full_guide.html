  .platform-name { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }

  .mentor-box { background: rgba(245,158,11,0.06); border: 1px solid rgba(245,158,11,0.2); border-radius: 8px; padding: 12px 14px; margin: 8px 0; }
  .mentor-label { font-size: 10px; font-weight: 700; color: var(--amber); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px; }

  /* WARNING BOX */
  .warn-box { background: rgba(239,68,68,0.06); border: 1px solid rgba(239,68,68,0.2); border-radius: 8px; padding: 10px 14px; margin: 8px 0; }

  /* SECTION DIVIDER */
  .section-divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

  /* FULL-WIDTH SECTION */
  .full-section { padding: 16px 20px; border-top: 1px solid var(--border); }

  /* MOBILE */

    .sessions-wrap{grid-template-columns:1fr;}
    .session:first-child{border-right:none;border-bottom:1px solid var(--border);}
    .sidebar{display:none;}
    .main{padding:14px;}
  }
</style>

                'import pandas as pd',

                'df = pd.read_csv("../data/master_dataset.csv", parse_dates=["date"])',
                'df = df.set_index("date").sort_index()',
                '',
                '# Cross-correlation: does demand lead or lag BTC price?',
                'def compute_lag_correlation(series_a, series_b, label_a, label_b, max_lag=8):',
                '    """',
                '    Compute correlation between series_a at time T',
                '    and series_b at time T+lag, for lag from -max_lag to +max_lag.',
                '    Positive lag: series_a leads series_b',
                '    Negative lag: series_a lags series_b',
                '    """',
                '    results = []',
                '    ',
                '    for lag in range(-max_lag, max_lag + 1):',
                '        if lag >= 0:',
                '            a = series_a.iloc[:len(series_a)-lag] if lag > 0 else series_a',
                '            b = series_b.shift(-lag).dropna()',
                '        else:',
                '            a = series_a.shift(abs(lag)).dropna()',
                '            b = series_b.iloc[abs(lag):]',
                '        ',
                '        # Align lengths',
                '        min_len = min(len(a), len(b))',
                '        a = a.iloc[:min_len]',
                '        b = b.iloc[:min_len]',
                '        ',
                '        if min_len < 10:',
                '            continue',
                '        ',
                '        r, p = stats.pearsonr(a, b)',
                '        results.append({"lag_weeks": lag, "correlation": round(r, 3), "p_value": round(p, 4)})',

                'elif best_lag["lag_weeks"] < 0:',

let currentWeek = 0;
const doneSet = new Set(JSON.parse(localStorage.getItem('p1_done')||'[]'));

function saveDone(){ try{ localStorage.setItem('p1_done', JSON.stringify([...doneSet])); }catch(e){} }

function updateProgress(){
  let totalSessions = 0, doneSessions = 0;
  WEEKS.forEach((w,wi)=>{
    let wDone = 0;
    w.days.forEach((d,di)=>{
      d.sessions.forEach((_,si)=>{
        totalSessions++;
        const key = `w${wi}d${di}s${si}`;
        if(doneSet.has(key)){ doneSessions++; wDone++; }
      });
    });
    const wTotal = w.days.length * 2;
    const el = document.getElementById(`wp-${wi}`);
    if(el) el.textContent = `${Math.min(wDone,wTotal)}/${wTotal}`;
    const btn = document.getElementById(`wb-${wi}`);
    if(btn){ btn.classList.toggle('done', wDone === wTotal); }
  });
  const pct = Math.round(doneSessions/totalSessions*100);
  document.getElementById('global-bar').style.width = pct+'%';
  document.getElementById('global-pct').textContent = pct+'%';
}

function showWeek(wi){
  currentWeek = wi;
  document.querySelectorAll('.week-btn').forEach((b,i)=>b.classList.toggle('active',i===wi));
  renderWeek(wi);
}

function renderWeek(wi){
  const w = WEEKS[wi];
  let html = `<div class="week-header">
    <div class="week-tag">${w.tag}</div>
    <div class="week-title">${w.title}</div>
    <div class="week-desc">${w.desc}</div>
    <div class="week-stats">
      <div class="wstat"><div class="wstat-val">${w.days.length}</div><div class="wstat-lbl">Work days</div></div>
      <div class="wstat"><div class="wstat-val">${w.days.length*2}</div><div class="wstat-lbl">Sessions</div></div>
      <div class="wstat"><div class="wstat-val">${w.days.length*4}h</div><div class="wstat-lbl">Total hours</div></div>
    </div>
  </div>`;

  w.days.forEach((day, di)=>{
    const s1done = doneSet.has(`w${wi}d${di}s0`);
    const s2done = doneSet.has(`w${wi}d${di}s1`);
    const allDone = s1done && s2done;
    html += `<div class="day-card${allDone?' done':''}" id="dc-${wi}-${di}">
      <div class="day-header" onclick="toggleDay(${wi},${di})">
        <div class="day-num">${di+1+(wi*4)}</div>
        <div class="day-info">
          <div class="day-label">${day.label}</div>
          <div class="day-title">${day.title}</div>
          <div class="day-chips">
            ${day.chips.map((c,ci)=>`<span class="chip ${ci===0?'chip-s1':'chip-s2'}">${c}</span>`).join('')}
            <span class="chip chip-del">→ ${day.deliverable[0]}</span>
          </div>
        </div>
        <div class="day-actions">
          <span class="chevron">▼</span>
        </div>
      </div>
      <div class="day-body">
        <div class="sessions-wrap">
          ${day.sessions.map((s,si)=>renderSession(wi,di,si,s)).join('')}
        </div>
        <div class="full-section">
          <div class="deliverable-box">
            <div class="deliverable-label">Day Deliverables</div>
            <ul class="deliverable-items">${day.deliverable.map(d=>`<li>${d}</li>`).join('')}</ul>
          </div>
          ${day.sessions[1] && day.sessions[1].post ? renderPost(day.sessions[1].post) : (day.sessions[0].post ? renderPost(day.sessions[0].post) : '')}
        </div>
      </div>
    </div>`;
  });

  document.getElementById('main-content').innerHTML = html;
  updateProgress();
}

function renderSession(wi, di, si, s){
  const key = `w${wi}d${di}s${si}`;
  const done = doneSet.has(key);
  let html = `<div class="session">
    <div class="session-header">
      <span class="session-badge ${si===0?'s1-badge':'s2-badge'}">${s.badge}</span>
      <span class="session-time">${s.time}</span>
      <button class="check-circle${done?' done':''}" onclick="toggleSession('${key}',${wi})" title="Mark complete">✓</button>
    </div>
    <div class="session-title">${s.title}</div>
    <ul class="steps">`;

  s.steps.forEach((step, i)=>{
    html += `<li class="step"><div class="step-num">${i+1}</div><div class="step-content">`;
    if(step.t) html += `<strong>${step.t}</strong><br>`;
    if(step.c) html += step.c.replace(/\n/g,'<br>');
    if(step.code){
      html += `<div class="code-block"><div class="code-header"><span class="code-lang">${step.code.lang}</span><button class="copy-btn" onclick="copyCode(this)">copy</button></div><pre>${step.code.lines.map(l=>escapeHtml(l)).join('\n')}</pre></div>`;
    }
    html += `</div></li>`;
  });

  html += `</ul>`;
  if(s.mentor) html += `<div class="mentor-box"><div class="mentor-label">Mentor note</div><div class="mentor-text">${s.mentor}</div></div>`;
  if(s.warn) html += `<div class="warn-box"><div class="warn-text">⚠ ${s.warn}</div></div>`;
  html += `</div>`;
  return html;
}

function renderPost(post){
  return `<div class="content-box">
    <div class="content-label">Publish today</div>
    <div class="platform-row"><div class="platform-name">LinkedIn</div><div class="platform-text">${post.linkedin}</div></div>
    <div class="platform-row"><div class="platform-name">TikTok</div><div class="platform-text">${post.tiktok}</div></div>
    <div class="platform-row"><div class="platform-name">X / Twitter</div><div class="platform-text">${post.x}</div></div>
  </div>`;
}

function toggleDay(wi, di){
  const card = document.getElementById(`dc-${wi}-${di}`);
  card.classList.toggle('open');
}

function toggleSession(key, wi){
  if(doneSet.has(key)) doneSet.delete(key);
  else doneSet.add(key);
  saveDone();
  renderWeek(wi);
}

function copyCode(btn){
  const pre = btn.closest('.code-block').querySelector('pre');
  navigator.clipboard.writeText(pre.innerText).then(()=>{
    btn.textContent = 'copied!';
    setTimeout(()=>btn.textContent='copy', 1500);
  });
}

function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

showWeek(0);
</script>
</body>
</html>
